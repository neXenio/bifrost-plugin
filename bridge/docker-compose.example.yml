# Example topology: Caddy (TLS) -> bridge (OAuth resource server) -> Bifrost.
# Only Caddy is exposed publicly; Bifrost is reachable solely through the bridge,
# so the virtual-key check cannot be bypassed.
#
# Caddyfile (mount at ./Caddyfile):
#
#   bifrost.luca-app.de {
#     reverse_proxy bridge:8787
#   }
#
services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      - bridge

  bridge:
    build: .
    environment:
      BRIDGE_PUBLIC_ORIGIN: https://bifrost.luca-app.de
      BRIDGE_UPSTREAM_URL: http://bifrost:8080
      KEYCLOAK_ISSUER: https://keycloak.luca-app.de/realms/mcp
      BRIDGE_REQUIRED_SCOPE: mcp:read
      VK_MAP_PATH: /data/vk-map.json
      PORT: "8787"
    volumes:
      # Written by vk-sync, read here. The map holds real keys — never bake
      # it into an image or commit it.
      - vk-data:/data:ro
    depends_on:
      - bifrost
      - vk-sync

  # Periodic export: Bifrost's SSO-provisioned user->VK table -> vk-map.json.
  # Keeps Bifrost the single source of truth; the admin token lives only here,
  # never in the request path. The bridge hot-reloads the file on change.
  vk-sync:
    build: .
    command: ["node", "src/sync-vk-map.mjs"]
    environment:
      BIFROST_ADMIN_URL: http://bifrost:8080
      BIFROST_ADMIN_TOKEN: ${BIFROST_ADMIN_TOKEN}   # bfst-* admin API key, from .env / secret store
      VK_MAP_PATH: /data/vk-map.json
      SYNC_INTERVAL_SECONDS: "300"
      # Pin these after inspecting your deployment's real response shape:
      # VK_SYNC_EMAIL_PATH: user.email
      # VK_SYNC_VALUE_PATH: value
    volumes:
      - vk-data:/data
    depends_on:
      - bifrost

  bifrost:
    # Replace with your actual Bifrost gateway image/config.
    image: maximhq/bifrost:latest
    expose:
      - "8080"

volumes:
  caddy-data:
  vk-data:
